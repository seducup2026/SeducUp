<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SeducUP{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px 16px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
}
        .container-central {
            width: 100%;
            max-width: 420px;
}
        .card-seducup {
            background: white;
            border-radius: 20px;
            padding: 32px 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: none;
            width: 100%;
        }
        .logo-text {
            color: #1565C0;
            font-weight: 800;
            font-size: 1.4rem;
        }
        .btn-principal {
            background: #1565C0;
            color: white;
            border-radius: 30px;
            padding: 13px;
            font-weight: 700;
            border: none;
            width: 100%;
        }
        .btn-principal:hover { background: #0d47a1; color: white; }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1.5px solid #e0e0e0;
        }
        .form-control:focus { border-color: #1565C0; box-shadow: none; }
        .dica-azul {
            background: #E3F2FD;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #1565C0;
            margin-bottom: 20px;
        }

        /* Responsivo */
        @media (max-width: 480px) {
            .card-seducup { padding: 24px 16px; border-radius: 16px; }
            .container-central { padding: 12px; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
