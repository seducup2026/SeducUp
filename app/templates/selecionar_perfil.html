{% extends 'base.html' %}

{% block title %}SeducUP - Perfil{% endblock %}

{% block content %}
<div class="container-central">
    <div class="text-center mb-4">
        <div class="logo-text">🎓 SeducUP</div>
        <h5 class="fw-bold mt-2">Como você acessa?</h5>
        <p class="text-muted" style="font-size:0.9rem">Selecione o seu perfil para continuar</p>
    </div>

    <a href="{{ url_for('auth.login', tipo='aluno') }}" style="background:white; border-radius:16px; padding:20px 24px; width:100%; display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; text-decoration:none; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
        <div class="d-flex align-items-center">
            <div style="width:48px; height:48px; border-radius:50%; background:#E3F0FF; display:flex; align-items:center; justify-content:center; font-size:1.4rem; margin-right:16px;">👨‍🎓</div>
            <div>
                <div class="fw-bold" style="color:#1565C0;">Aluno</div>
                <div style="color:#888; font-size:0.85rem;">Login com RA</div>
            </div>
        </div>
        <span style="color:#ccc; font-size:1.4rem;">›</span>
    </a>

    <a href="{{ url_for('auth.login', tipo='coordenador') }}" style="background:white; border-radius:16px; padding:20px 24px; width:100%; display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; text-decoration:none; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
        <div class="d-flex align-items-center">
            <div style="width:48px; height:48px; border-radius:50%; background:#FFF0E0; display:flex; align-items:center; justify-content:center; font-size:1.4rem; margin-right:16px;">🧑‍💼</div>
            <div>
                <div class="fw-bold" style="color:#E65100;">Coordenador</div>
                <div style="color:#888; font-size:0.85rem;">Login com matrícula</div>
            </div>
        </div>
        <span style="color:#ccc; font-size:1.4rem;">›</span>
    </a>

    <p style="color:#aaa; font-size:0.78rem; margin-top:20px; text-align:center;">🔒 Seu acesso é seguro e seus dados estão protegidos.</p>
</div>
{% endblock %}
