<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeducUP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #1565C0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .logo-icon {
            font-size: 80px;
            margin-bottom: 10px;
        }
        h1 {
            color: white;
            font-size: 2.5rem;
            font-weight: 800;
        }
        .tagline {
            color: rgba(255,255,255,0.85);
            font-size: 1rem;
            margin-bottom: 60px;
        }
        .btn-entrar {
            background: white;
            color: #1565C0;
            font-weight: 700;
            border-radius: 30px;
            padding: 14px 0;
            font-size: 1rem;
            width: 100%;
            max-width: 320px;
            border: none;
            margin-bottom: 12px;
        }
        .btn-entrar:hover {
            background: #f0f0f0;
            color: #1565C0;
        }
        .btn-criar {
            background: transparent;
            color: white;
            font-weight: 700;
            border-radius: 30px;
            padding: 14px 0;
            font-size: 1rem;
            width: 100%;
            max-width: 320px;
            border: 2px solid white;
        }
        .btn-criar:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
    </style>
</head>
<body>
    <div class="logo-icon">🎓</div>
    <h1>SeducUP</h1>
    <p class="tagline">Educação que transforma</p>

    <a href="{{ url_for('auth.selecionar_perfil') }}" class="btn btn-entrar">Entrar</a>
    <a href="#" class="btn btn-criar mt-2">Criar conta</a>
</body>
</html>
