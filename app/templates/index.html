{% extends 'base.html' %}

{% block title %}SeducUP{% endblock %}

{% block extra_css %}
<style>
    body {
        background: #1565C0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    h1 { color: white; font-size: 2.2rem; font-weight: 800; }
    .tagline { color: rgba(255,255,255,0.85); font-size: 1rem; margin-bottom: 50px; }
    .btn-entrar {
        background: white;
        color: #1565C0;
        font-weight: 700;
        border-radius: 30px;
        padding: 14px 0;
        font-size: 1rem;
        width: 100%;
        border: none;
        margin-bottom: 12px;
        display: block;
        text-align: center;
        text-decoration: none;
    }
    .btn-entrar:hover { background: #f0f0f0; color: #1565C0; }
    .btn-criar {
        background: transparent;
        color: white;
        font-weight: 700;
        border-radius: 30px;
        padding: 14px 0;
        font-size: 1rem;
        width: 100%;
        border: 2px solid white;
        display: block;
        text-align: center;
        text-decoration: none;
    }
    .btn-criar:hover { background: rgba(255,255,255,0.1); color: white; }
    .logo-icon { font-size: 70px; margin-bottom: 10px; }
</style>
{% endblock %}

{% block content %}
<div class="container-central text-center">
    <div class="logo-icon">🎓</div>
    <h1>SeducUP</h1>
    <p class="tagline">Plataforma de reconhecimento estudantil</p>

    <a href="{{ url_for('auth.selecionar_perfil') }}" class="btn-entrar">Entrar</a>
    <a href="{{ url_for('auth.cadastro_coordenador') }}" class="btn-criar">Criar conta</a>
</div>
{% endblock %}
